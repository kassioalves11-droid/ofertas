<!-- Firebase (versão compatível) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCjgVssbAJEK48Ut7P4rBJtIxoS9z7YO-o",
  authDomain: "ofertas-6b180.firebaseapp.com",
  projectId: "ofertas-6b180"
};

// iniciar firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const container = document.getElementById("produtos");

// carregar produtos
fetch("produtos.json")
  .then(r => r.json())
  .then(data => {

    data.forEach(async produto => {

      let count = 0;

      try {
        const docRef = db.collection("cliques").doc(produto.nome);
        const docSnap = await docRef.get();

        if (docSnap.exists) {
          count = docSnap.data().count;
        }

      } catch (e) {
        console.log("erro firebase:", e);
      }

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${produto.imagem}">
        <h3>${produto.nome}</h3>
        <p>👆 ${count} cliques</p>
        <a class="botao" href="${produto.link}" target="_blank">
        🔥 COMPRAR
        </a>
      `;

      // salvar clique
      card.querySelector("a").addEventListener("click", async () => {
        try {
          await db.collection("cliques").doc(produto.nome).set({
            count: count + 1
          });
        } catch (e) {
          console.log("erro salvar:", e);
        }
      });

      container.appendChild(card);

    });

  })
  .catch(e => {
    container.innerHTML = "❌ erro ao carregar produtos";
    console.log(e);
  });

</script>
