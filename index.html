<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCjgVssbAJEK48Ut7P4rBJtIxoS9z7YO-o",
  authDomain: "ofertas-6b180.firebaseapp.com",
  projectId: "ofertas-6b180"
};

// inicia firebase
let db = null;

try {
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
} catch (e) {
  console.log("Firebase não iniciou:", e);
}

const container = document.getElementById("produtos");

// carrega produtos
fetch("produtos.json")
  .then(r => r.json())
  .then(async data => {

    for (let produto of data) {

      let count = 0;

      // tenta pegar cliques (sem quebrar se falhar)
      if (db) {
        try {
          const ref = doc(db, "cliques", produto.nome);
          const snap = await getDoc(ref);
          count = snap.exists() ? snap.data().count : 0;
        } catch (e) {
          console.log("Erro Firebase:", e);
        }
      }

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${produto.imagem}">
        <h3>${produto.nome}</h3>
        <p>👆 ${count} cliques</p>
        <a class="botao" href="${produto.link}" target="_blank">
        🔥 COMPRAR COM DESCONTO
        </a>
      `;

      // clique salva (se firebase ativo)
      if (db) {
        const ref = doc(db, "cliques", produto.nome);

        card.querySelector("a").addEventListener("click", async () => {
          try {
            await setDoc(ref, { count: count + 1 });
          } catch (e) {
            console.log("Erro ao salvar:", e);
          }
        });
      }

      container.appendChild(card);
    }

  })
  .catch(e => {
    container.innerHTML = "❌ erro ao carregar produtos";
    console.log(e);
  });

</script>
