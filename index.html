<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Achadinhos do Dia</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

.card {
    background: #222;
    margin: 15px auto;
    padding: 15px;
    border-radius: 10px;
    width: 90%;
    max-width: 400px;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.top {
    border: 2px solid gold;
    box-shadow: 0 0 10px gold;
}

.botao {
    display: block;
    margin-top: 10px;
    padding: 14px;
    background: #ff6600;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    50% { transform: scale(1.05); }
}
</style>

</head>

<body>

<h1>🔥 Achadinhos do Dia</h1>

<div id="produtos"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

document.addEventListener("DOMContentLoaded", function() {

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCjgVssbAJEK48Ut7P4rBJtIxoS9z7YO-o",
  authDomain: "ofertas-6b180.firebaseapp.com",
  projectId: "ofertas-6b180"
};

// iniciar firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const container = document.getElementById("produtos");

// carregar produtos
fetch("produtos.json")
  .then(r => r.json())
  .then(async data => {

    let lista = [];

    for (let produto of data) {

      let count = 0;

      try {
        const ref = db.collection("cliques").doc(produto.nome);
        const snap = await ref.get();

        if (snap.exists) {
          count = snap.data().count;
        }

      } catch (e) {
        console.log("erro firebase:", e);
      }

      lista.push({
        ...produto,
        count: count
      });
    }

    // 🔥 ORDENAR PELO MAIS CLICADO
    lista.sort((a, b) => b.count - a.count);

    // renderizar
    lista.forEach((produto, index) => {

      const card = document.createElement("div");
      card.className = "card";

      // destaque no primeiro
      if (index === 0) {
        card.classList.add("top");
      }

      const destaque = index === 0 ? "🔥 MAIS VENDIDO" : "";

      card.innerHTML = `
        <img src="${produto.imagem}">
        <h3>${produto.nome}</h3>
        <p>${destaque}</p>
        <p>👆 ${produto.count} cliques</p>
        <a class="botao" href="${produto.link}" target="_blank">
        🔥 COMPRAR AGORA
        </a>
      `;

      // salvar clique
      card.querySelector("a").addEventListener("click", async () => {
        try {
          await db.collection("cliques").doc(produto.nome).set({
            count: produto.count + 1
          });
        } catch (e) {
          console.log("erro salvar:", e);
        }
      });

      container.appendChild(card);

    });

  })
  .catch(e => {
    container.innerHTML = "❌ erro ao carregar produtos";
    console.log(e);
  });

});

</script>

</body>
</html>
