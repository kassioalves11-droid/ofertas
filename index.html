<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Achadinhos do Dia</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

.card {
    background: #222;
    margin: 15px auto;
    padding: 15px;
    border-radius: 10px;
    width: 90%;
    max-width: 400px;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.botao {
    display: block;
    margin-top: 10px;
    padding: 14px;
    background: #ff6600;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    50% { transform: scale(1.05); }
}
</style>

</head>

<body>

<h1>🔥 Achadinhos do Dia</h1>

<!-- 🔥 ESSA DIV É OBRIGATÓRIA -->
<div id="produtos"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

document.addEventListener("DOMContentLoaded", function() {

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCjgVssbAJEK48Ut7P4rBJtIxoS9z7YO-o",
  authDomain: "ofertas-6b180.firebaseapp.com",
  projectId: "ofertas-6b180"
};

// iniciar firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const container = document.getElementById("produtos");

// carregar produtos
fetch("produtos.json")
  .then(r => r.json())
  .then(data => {

    data.forEach(async produto => {

      let count = 0;

      try {
        const docRef = db.collection("cliques").doc(produto.nome);
        const docSnap = await docRef.get();

        if (docSnap.exists) {
          count = docSnap.data().count;
        }

      } catch (e) {
        console.log("erro firebase:", e);
      }

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${produto.imagem}">
        <h3>${produto.nome}</h3>
        <p>👆 ${count} cliques</p>
        <a class="botao" href="${produto.link}" target="_blank">
        🔥 COMPRAR
        </a>
      `;

      // salvar clique
      card.querySelector("a").addEventListener("click", async () => {
        try {
          await db.collection("cliques").doc(produto.nome).set({
            count: count + 1
          });
        } catch (e) {
          console.log("erro salvar:", e);
        }
      });

      container.appendChild(card);

    });

  })
  .catch(e => {
    container.innerHTML = "❌ erro ao carregar produtos";
    console.log(e);
  });

});

</script>

</body>
</html>
