<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ofertas</title>

  <!-- FIREBASE -->

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#111;
      font-family:Arial;
      color:white;
      padding:20px;
    }

    h1{
      text-align:center;
      margin-bottom:30px;
      color:#00e676;
    }

    .produtos{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card{
      background:#1e1e1e;
      border-radius:12px;
      overflow:hidden;
      padding:15px;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.03);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
      border-radius:10px;
    }

    .card h2{
      margin-top:15px;
      font-size:20px;
    }

    .preco{
      color:#00e676;
      font-size:22px;
      margin-top:10px;
      font-weight:bold;
    }

    .descricao{
      margin-top:10px;
      color:#ccc;
    }

    .botao{
      display:block;
      text-align:center;
      background:#00c853;
      color:white;
      padding:12px;
      margin-top:15px;
      border-radius:8px;
      text-decoration:none;
      font-weight:bold;
    }

  </style>

</head>
<body>

  <h1>🔥 Ofertas em Destaque</h1>

  <div class="produtos" id="produtos"></div>

  <script>

    // FIREBASE CONFIG

    const firebaseConfig = {

      apiKey: "AIzaSyBrd48UiFiA5OGN2rhLptXSSg_PX5s4AGA",

      authDomain: "app-afiliados-971c8.firebaseapp.com",

      projectId: "app-afiliados-971c8",

      storageBucket: "app-afiliados-971c8.firebasestorage.app",

      messagingSenderId: "763269723561",

      appId: "1:763269723561:web:b1063af684ce37ed3cc0b8"

    };

    firebase.initializeApp(firebaseConfig);

    const db = firebase.firestore();

    // CARREGAR PRODUTOS

    async function carregarProdutos(){

      const container = document.getElementById("produtos");

      const snapshot = await db.collection("produtos").get();

      snapshot.forEach(doc => {

        const produto = doc.data();

        container.innerHTML += `

          <div class="card">

            <img src="${produto.imagem}">

            <h2>${produto.titulo}</h2>

            <div class="preco">
              R$ ${produto.preco}
            </div>

            <div class="descricao">
              ${produto.descricao}
            </div>

            <a
              href="${produto.link}"
              target="_blank"
              class="botao"
            >
              Comprar Agora
            </a>

          </div>

        `;

      });

    }

    carregarProdutos();

  </script>

</body>
</html>
