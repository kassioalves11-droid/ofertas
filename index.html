<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Achadinhos do Dia</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

.container {
    margin-top: 20px;
}

.card {
    background: #222;
    margin: 15px auto;
    padding: 15px;
    border-radius: 12px;
    width: 90%;
    max-width: 400px;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.botao {
    display: block;
    margin-top: 10px;
    padding: 14px;
    background: #ff6600;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<h1>🔥 Achadinhos do Dia</h1>
<p>🚨 Ofertas limitadas</p>

<div class="container" id="produtos"></div>

<script>
let clicks = JSON.parse(localStorage.getItem("clicks")) || {};

fetch("produtos.json")
  .then(res => res.json())
  .then(data => {

    // ordenar por cliques
    data.sort((a, b) => (clicks[b.nome] || 0) - (clicks[a.nome] || 0));

    const container = document.getElementById("produtos");

    data.forEach(produto => {

      const count = clicks[produto.nome] || 0;

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${produto.imagem}">
        <h3>${produto.nome}</h3>
        <p>👆 ${count} pessoas já clicaram</p>
        <a class="botao" href="${produto.link}" target="_blank">🔥 COMPRAR AGORA</a>
      `;

      // evento de clique
      card.querySelector("a").addEventListener("click", () => {
        clicks[produto.nome] = (clicks[produto.nome] || 0) + 1;
        localStorage.setItem("clicks", JSON.stringify(clicks));
      });

      container.appendChild(card);
    });

  });
</script>

</body>
</html>
