<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ofertas 🔥</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

.container {
    margin-top: 30px;
}

.card {
    background: #222;
    margin: 15px auto;
    padding: 15px;
    border-radius: 10px;
    width: 90%;
    max-width: 400px;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card a {
    display: block;
    margin-top: 10px;
    padding: 10px;
    background: #ff6600;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>🔥 Achadinhos do Dia</h1>

<div class="container" id="produtos"></div>

<script>
fetch("produtos.json")
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("produtos");

    data.forEach(p => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${p.imagem}">
        <h3>${p.titulo}</h3>
        <a href="${p.link}" target="_blank">🛒 Comprar</a>
      `;

      container.appendChild(card);
    });

  })
  .catch(err => {
    console.error("Erro ao carregar produtos:", err);
  });
</script>

</body>
</html>
