<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel IA Afiliados - Fase 2</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  background:#111;
  color:white;
  font-family:Arial;
  padding:20px;
}

.container{
  max-width:950px;
  margin:auto;
  background:#1e1e1e;
  padding:25px;
  border-radius:12px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2c2c2c;
  color:white;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
  font-weight:bold;
}

.produto{
  background:#2a2a2a;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

.produto img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

a{
  color:#00e676;
}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:6px;
  background:#333;
  margin-top:5px;
}

</style>

</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginBox">

<h1>Login IA Admin</h1>

<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<!-- PAINEL -->
<div class="container" id="painel" style="display:none;">

<h1>🚀 Painel IA Afiliados - Fase 2</h1>

<input id="titulo" placeholder="Título">
<input id="preco" placeholder="Preço">
<input id="imagem" placeholder="Imagem URL">
<input id="link" placeholder="Link afiliado">
<input id="categoria" placeholder="Categoria">

<button onclick="salvarProduto()">Salvar Produto</button>
<button onclick="logout()">Sair</button>

<hr>

<h2>📥 Importar CSV</h2>
<input type="file" id="csvFile">
<button onclick="importarCSV()">Importar</button>

<hr>

<h2>🧠 IA de decisão</h2>
<p id="iaSugestao"></p>

<hr>

<h2>📊 Gráfico de performance</h2>
<canvas id="grafico"></canvas>

<hr>

<h2>📦 Modo Operação (o que postar hoje)</h2>
<div id="operacao"></div>

<hr>

<h2>🏆 Vencedores</h2>
<div id="vencedores"></div>

<hr>

<h2>📦 Produtos</h2>
<div id="listaProdutos"></div>

</div>

<script>

// =====================================
// FIREBASE
// =====================================

const firebaseConfig = {
  apiKey: "AIzaSyBrd48UiFiA5OGN2rhLptXSSg_PX5s4AGA",
  authDomain: "app-afiliados-971c8.firebaseapp.com",
  projectId: "app-afiliados-971c8",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// =====================================
// LOGIN
// =====================================

function login(){

  firebase.auth()
  .signInWithEmailAndPassword(email.value, senha.value)
  .then(()=>{
    loginBox.style.display="none";
    painel.style.display="block";
    carregarTudo();
  })
  .catch(()=>alert("Erro login"));

}

function logout(){
  firebase.auth().signOut();
  location.reload();
}

firebase.auth().onAuthStateChanged(user=>{
  if(user){
    loginBox.style.display="none";
    painel.style.display="block";
    carregarTudo();
  }
});

// =====================================
// SALVAR PRODUTO
// =====================================

async function salvarProduto(){

  await db.collection("produtos").add({
    titulo: titulo.value,
    preco: preco.value,
    imagem: imagem.value,
    link: link.value,
    categoria: categoria.value,

    score: 0,
    cliques: 0,
    nivel: "medio",
    status: "novo",
    createdAt: new Date()
  });

  carregarTudo();
}

// =====================================
// CSV
// =====================================

async function importarCSV(){

  const file = csvFile.files[0];
  if(!file) return;

  const text = await file.text();
  const linhas = text.split("\n");

  linhas.shift();

  for(const l of linhas){

    if(!l.trim()) continue;

    const d = l.split(",");

    await db.collection("produtos").add({
      titulo: d[0],
      preco: d[1],
      imagem: d[2],
      link: d[3],
      categoria: d[4] || "produto",

      score: 0,
      cliques: 0,
      nivel: "medio",
      status: "novo",
      createdAt: new Date()
    });

  }

  carregarTudo();
}

// =====================================
// CLIQUES
// =====================================

async function clicou(id){

  const ref = db.collection("produtos").doc(id);
  const doc = await ref.get();

  let atual = doc.data().cliques || 0;

  await ref.update({
    cliques: atual + 1
  });

}

// =====================================
// SCORE
// =====================================

async function aumentarScore(id, atual){

  await db.collection("produtos")
  .doc(id)
  .update({ score: atual + 1 });

  carregarTudo();

}

// =====================================
// IA PLATAFORMA
// =====================================

function plataforma(score){

  if(score >= 8) return "📱 TikTok (viral)";
  if(score >= 5) return "📸 Reels (engajamento)";
  return "⚡ Kwai (alcance rápido)";
}

// =====================================
// DECISÃO
// =====================================

function decidir(p){

  let score = p.score || 0;
  let cliques = p.cliques || 0;

  let v = score + (cliques * 2);

  if(v >= 10) return "🚀 POSTAR AGORA";
  if(v >= 5) return "⚠️ POSTAR DEPOIS";
  return "❌ IGNORAR";
}

// =====================================
// PACOTE POSTAGEM
// =====================================

function pacote(p){

  return `
📦 POSTAGEM PRONTA

📌 ${p.titulo}
💰 ${p.preco}

🔥 OFERTA IMPERDÍVEL
${p.titulo}
💰 R$ ${p.preco}

🚀 link na bio
#oferta #promo #achados

🔗 ${p.link}
`;
}

// =====================================
// CARREGAR TUDO
// =====================================

async function carregarTudo(){

  carregarProdutos();
  carregarVencedores();
  carregarGrafico();
  carregarIA();
  carregarOperacao();

}

// =====================================
// PRODUTOS
// =====================================

async function carregarProdutos(){

  listaProdutos.innerHTML = "";

  const snap = await db.collection("produtos")
  .orderBy("score","desc")
  .get();

  snap.forEach(doc=>{

    let p = doc.data();

    listaProdutos.innerHTML += `
      <div class="produto">

        <h3>${p.titulo}</h3>
        <p>💰 ${p.preco}</p>
        <p>⭐ ${p.score || 0}</p>
        <p>👆 ${p.cliques || 0}</p>

        <span class="badge">${plataforma(p.score || 0)}</span>

        <img src="${p.imagem}">

        <a href="${p.link}" target="_blank"
        onclick="clicou('${doc.id}')">
          🔗 Abrir oferta
        </a>

      </div>
    `;

  });

}

// =====================================
// VENCEDORES
// =====================================

async function carregarVencedores(){

  vencedores.innerHTML = "";

  const snap = await db.collection("produtos")
  .orderBy("score","desc")
  .limit(5)
  .get();

  snap.forEach(doc=>{

    let p = doc.data();

    vencedores.innerHTML += `
      <div class="produto">
        <h3>🔥 ${p.titulo}</h3>
        <p>⭐ ${p.score}</p>
      </div>
    `;

  });

}

// =====================================
// GRÁFICO
// =====================================

async function carregarGrafico(){

  const snap = await db.collection("produtos").get();

  let labels = [];
  let data = [];

  snap.forEach(doc=>{

    let p = doc.data();

    labels.push(p.titulo);
    data.push((p.score||0) + (p.cliques||0)*2);

  });

  new Chart(document.getElementById("grafico"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Performance real",
        data
      }]
    }
  });

}

// =====================================
// IA
// =====================================

async function carregarIA(){

  const snap = await db.collection("produtos").get();

  let melhor = null;
  let maior = 0;

  snap.forEach(doc=>{

    let p = doc.data();

    let v = (p.score||0) + (p.cliques||0)*2;

    if(v > maior){
      maior = v;
      melhor = p;
    }

  });

  if(melhor){

    if(maior >= 10){
      iaSugestao.innerHTML = "🚀 ESCALAR AGORA";
    } else if(maior >= 5){
      iaSugestao.innerHTML = "⚠️ TESTAR";
    } else {
      iaSugestao.innerHTML = "❌ DESCARTAR";
    }

  }

}

// =====================================
// MODO OPERAÇÃO
// =====================================

async function carregarOperacao(){

  operacao.innerHTML = "";

  const snap = await db.collection("produtos")
  .orderBy("score","desc")
  .limit(5)
  .get();

  snap.forEach(doc=>{

    let p = doc.data();

    operacao.innerHTML += `
      <div class="produto">

        <h3>${p.titulo}</h3>

        <p>${decidir(p)}</p>

        <p>📱 Plataforma: ${plataforma(p.score || 0)}</p>

        <pre>${pacote(p)}</pre>

      </div>
    `;

  });

}

</script>

</body>
</html>
