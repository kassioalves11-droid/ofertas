<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin Inteligente</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  background:#111;
  color:white;
  font-family:Arial;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
  background:#1e1e1e;
  padding:25px;
  border-radius:12px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2c2c2c;
  color:white;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
  font-weight:bold;
}

.produto{
  background:#2a2a2a;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

.produto img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

.acoes{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btnExcluir{ background:#d50000; }
.btnScore{ background:#2962ff; }

a{
  color:#00e676;
}

</style>

</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginBox">

<h1>Login Admin IA</h1>

<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<!-- PAINEL -->
<div class="container" id="painel" style="display:none;">

<h1>🚀 Painel Inteligente de Afiliados</h1>

<input id="titulo" placeholder="Título">
<input id="preco" placeholder="Preço">
<input id="imagem" placeholder="Imagem URL">
<input id="link" placeholder="Link afiliado">
<input id="categoria" placeholder="Categoria">

<button onclick="salvarProduto()">Salvar Produto</button>
<button onclick="logout()">Sair</button>

<hr>

<h2>📥 Importar CSV</h2>
<input type="file" id="csvFile">
<button onclick="importarCSV()">Importar</button>

<hr>

<h2>🧠 IA (Sugestão automática)</h2>
<p id="iaSugestao">Carregando...</p>

<hr>

<h2>📊 Gráfico de Performance</h2>
<canvas id="grafico"></canvas>

<hr>

<h2>🏆 Vencedores</h2>
<div id="vencedores"></div>

<hr>

<h2>📦 Produtos</h2>
<div id="listaProdutos"></div>

</div>

<script>

// =====================================
// FIREBASE
// =====================================

const firebaseConfig = {
  apiKey: "AIzaSyBrd48UiFiA5OGN2rhLptXSSg_PX5s4AGA",
  authDomain: "app-afiliados-971c8.firebaseapp.com",
  projectId: "app-afiliados-971c8",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// =====================================
// LOGIN
// =====================================

function login(){

  firebase.auth()
  .signInWithEmailAndPassword(email.value, senha.value)
  .then(()=>{
    loginBox.style.display="none";
    painel.style.display="block";
    carregarTudo();
  })
  .catch(e=>alert("Erro login"));
}

function logout(){
  firebase.auth().signOut();
  location.reload();
}

// =====================================
// AUTENTICAÇÃO
// =====================================

firebase.auth().onAuthStateChanged(user=>{
  if(user){
    loginBox.style.display="none";
    painel.style.display="block";
    carregarTudo();
  }
});

// =====================================
// SALVAR PRODUTO
// =====================================

async function salvarProduto(){

  await db.collection("produtos").add({
    titulo: titulo.value,
    preco: preco.value,
    imagem: imagem.value,
    link: link.value,
    categoria: categoria.value,

    score: 0,
    cliques: 0,
    videosGerados: 0,
    nivel: "medio",
    status: "novo",
    createdAt: new Date()
  });

  carregarTudo();
}

// =====================================
// CSV
// =====================================

async function importarCSV(){

  const file = csvFile.files[0];
  if(!file) return;

  const text = await file.text();
  const linhas = text.split("\n");

  linhas.shift();

  for(const l of linhas){

    if(!l.trim()) continue;

    const d = l.split(",");

    await db.collection("produtos").add({
      titulo: d[0],
      preco: d[1],
      imagem: d[2],
      link: d[3],
      categoria: d[4] || "produto",

      score: 0,
      cliques: 0,
      videosGerados: 0,
      nivel: "medio",
      status: "novo",
      createdAt: new Date()
    });

  }

  carregarTudo();
}

// =====================================
// CLIQUE TRACKING
// =====================================

async function clicou(id){

  const ref = db.collection("produtos").doc(id);
  const doc = await ref.get();

  let atual = doc.data().cliques || 0;

  await ref.update({
    cliques: atual + 1
  });

}

// =====================================
// SCORE
// =====================================

async function aumentarScore(id, atual){

  await db.collection("produtos")
  .doc(id)
  .update({ score: atual + 1 });

  carregarTudo();
}

// =====================================
// CARREGAR TUDO
// =====================================

async function carregarTudo(){
  carregarProdutos();
  carregarVencedores();
  carregarGrafico();
  carregarIA();
}

// =====================================
// PRODUTOS
// =====================================

async function carregarProdutos(){

  listaProdutos.innerHTML = "";

  const snap = await db.collection("produtos")
  .orderBy("score","desc")
  .get();

  snap.forEach(doc=>{

    let p = doc.data();

    listaProdutos.innerHTML += `
      <div class="produto">

        <h3>${p.titulo}</h3>
        <p>💰 ${p.preco}</p>
        <p>⭐ Score: ${p.score || 0}</p>
        <p>👆 Cliques: ${p.cliques || 0}</p>

        <img src="${p.imagem}">

        <a href="${p.link}" target="_blank"
        onclick="clicou('${doc.id}')">
          🔗 Abrir oferta
        </a>

        <div class="acoes">

          <button class="btnScore"
          onclick="aumentarScore('${doc.id}',${p.score||0})">
            + Score
          </button>

        </div>

      </div>
    `;

  });

}

// =====================================
// VENCEDORES
// =====================================

async function carregarVencedores(){

  vencedores.innerHTML = "";

  const snap = await db.collection("produtos")
  .orderBy("score","desc")
  .limit(5)
  .get();

  snap.forEach(doc=>{

    let p = doc.data();

    vencedores.innerHTML += `
      <div class="produto">

        <h3>🔥 ${p.titulo}</h3>
        <p>⭐ ${p.score}</p>
        <p>👆 ${p.cliques || 0} cliques</p>

      </div>
    `;

  });

}

// =====================================
// GRÁFICO
// =====================================

async function carregarGrafico(){

  const snap = await db.collection("produtos").get();

  let labels = [];
  let data = [];

  snap.forEach(doc=>{
    let p = doc.data();
    labels.push(p.titulo);
    data.push((p.score||0) + (p.cliques||0)*2);
  });

  new Chart(document.getElementById("grafico"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Performance real",
        data: data
      }]
    }
  });

}

// =====================================
// IA REAL
// =====================================

async function carregarIA(){

  const snap = await db.collection("produtos").get();

  let melhor = null;
  let maior = 0;

  snap.forEach(doc=>{

    let p = doc.data();

    let score = p.score || 0;
    let cliques = p.cliques || 0;

    let valor = score + (cliques * 2);

    if(valor > maior){
      maior = valor;
      melhor = p;
    }

  });

  if(melhor){

    if(maior >= 10){
      iaSugestao.innerHTML = "🚀 ESCALAR AGORA";
    } else if(maior >= 5){
      iaSugestao.innerHTML = "⚠️ EM TESTE";
    } else {
      iaSugestao.innerHTML = "❌ DESCARTAR";
    }

  }

}

</script>

</body>
</html>
