<!-- FUNÇÃO CLICK A/B -->
<!-- ===================================== -->

<script>

async function clickEstilo(id, estilo){

  const ref =
    db.collection("produtos").doc(id);

  const doc =
    await ref.get();

  let p = doc.data();

  let clicksA =
    p.clicksA || 0;

  let clicksB =
    p.clicksB || 0;

  // =====================================
  // SOMAR CLICK
  // =====================================

  if(estilo === "A"){

    clicksA++;

  }else{

    clicksB++;

  }

  // =====================================
  // DEFINIR VENCEDOR
  // =====================================

  let vencedor = "EMPATE";

  if(clicksA > clicksB){

    vencedor = "A";

  }

  if(clicksB > clicksA){

    vencedor = "B";

  }

  // =====================================
  // UPDATE FIREBASE
  // =====================================

  await ref.update({

    clicksA,
    clicksB,
    estiloVencedor: vencedor

  });

  carregarTudo();

}

</script>

<script>

async function carregarProdutos(){

  listaProdutos.innerHTML = "";

  const snap =
    await db.collection("produtos")
    .orderBy("score","desc")
    .get();

  snap.forEach(doc=>{

    let p = doc.data();

    listaProdutos.innerHTML += `

      <div class="produto">

        <h3>${p.titulo}</h3>

        <p>💰 ${p.preco}</p>

        <p>
        ⭐ Score:
        ${p.score || 0}
        </p>

        <p>
        👆 Cliques:
        ${p.cliques || 0}
        </p>

        <p>
        📈 Viralidade:
        ${viralidade(p).toFixed(1)}
        </p>

        <p>
        🏷️ ${nivelAutomatico(p)}
        </p>

        <p>
        📱 Plataforma:
        ${plataforma(p.score || 0)}
        </p>

        <p>
        🏆 Estilo vencedor:
        ${p.estiloVencedor || "Nenhum"}
        </p>

        <p>
        🅰️ A:
        ${p.clicksA || 0}

        |

        🅱️ B:
        ${p.clicksB || 0}
        </p>

        <span class="badge">
        ${plataforma(p.score || 0)}
        </span>

        <img src="${p.imagem}">

        <br><br>

        <button onclick="clickEstilo('${doc.id}','A')">
        🔥 Vídeo A performou
        </button>

        <button onclick="clickEstilo('${doc.id}','B')">
        ✨ Vídeo B performou
        </button>

        <br><br>

        <a href="${p.link}"
        target="_blank"
        onclick="clicou('${doc.id}')">

        🔗 Abrir Oferta

        </a>

      </div>

    `;

  });

}

</script>
