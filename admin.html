<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Admin</title>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#111;
  color:white;
  font-family:Arial, sans-serif;
  padding:20px;
}

.container{
  max-width:700px;
  margin:auto;
  background:#1e1e1e;
  padding:25px;
  border-radius:12px;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
  margin-top:40px;
}

h1{
  text-align:center;
  margin-bottom:20px;
  color:#00e676;
}

input,
textarea{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:8px;
  background:#2c2c2c;
  color:white;
  font-size:15px;
}

textarea{
  height:120px;
  resize:none;
}

button{
  width:100%;
  padding:15px;
  margin-top:18px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

#status{
  margin-top:15px;
  text-align:center;
  color:#00e676;
}

.produto{
  background:#2a2a2a;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

.produto img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

.acoes{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btnExcluir{
  background:#d50000;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="container" id="loginBox">

<h1>Login Admin</h1>

<input
type="email"
id="email"
placeholder="Email"
>

<input
type="password"
id="senha"
placeholder="Senha"
>

<button onclick="login()">
Entrar
</button>

</div>

<!-- PAINEL -->

<div
class="container"
id="painel"
style="display:none;"
>

<h1>Painel Admin</h1>

<input
type="text"
id="titulo"
placeholder="Título do produto"
>

<input
type="text"
id="preco"
placeholder="Preço"
>

<input
type="text"
id="imagem"
placeholder="URL da imagem"
>

<input
type="text"
id="link"
placeholder="Link afiliado"
>

<input
type="text"
id="categoria"
placeholder="Categoria"
>

<textarea
id="descricao"
placeholder="Descrição"
></textarea>

<button onclick="salvarProduto()">
Salvar Produto
</button>

<button onclick="logout()">
Sair
</button>

<div id="status"></div>

<!-- IMPORTAR CSV -->

<h1 style="margin-top:40px;">
Importar CSV
</h1>

<input
type="file"
id="csvFile"
accept=".csv"
/>

<button onclick="importarCSV()">
Importar Produtos
</button>

<!-- LISTA -->

<h1 style="margin-top:40px;">
Produtos
</h1>

<div id="listaProdutos"></div>

</div>

<script>

// =====================================
// FIREBASE
// =====================================

const firebaseConfig = {

  apiKey: "AIzaSyBrd48UiFiA5OGN2rhLptXSSg_PX5s4AGA",

  authDomain: "app-afiliados-971c8.firebaseapp.com",

  projectId: "app-afiliados-971c8",

  storageBucket: "app-afiliados-971c8.firebasestorage.app",

  messagingSenderId: "763269723561",

  appId: "1:763269723561:web:b1063af684ce37ed3cc0b8"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// =====================================
// LOGIN
// =====================================

function login(){

  const email =
    document.getElementById("email").value;

  const senha =
    document.getElementById("senha").value;

  firebase.auth()
    .signInWithEmailAndPassword(email, senha)

    .then(() => {

      document.getElementById("loginBox")
        .style.display = "none";

      document.getElementById("painel")
        .style.display = "block";

      carregarProdutos();

    })

    .catch((error) => {

      alert("Erro login: " + error.message);

    });

}

// =====================================
// LOGOUT
// =====================================

function logout(){

  firebase.auth().signOut();

  location.reload();

}

// =====================================
// VERIFICAR LOGIN
// =====================================

firebase.auth().onAuthStateChanged(user => {

  if(user){

    document.getElementById("loginBox")
      .style.display = "none";

    document.getElementById("painel")
      .style.display = "block";

    carregarProdutos();

  }

});

// =====================================
// SALVAR PRODUTO
// =====================================

async function salvarProduto(){

  const status =
    document.getElementById("status");

  const produto = {

    titulo:
      document.getElementById("titulo").value,

    preco:
      document.getElementById("preco").value,

    imagem:
      document.getElementById("imagem").value,

    link:
      document.getElementById("link").value,

    categoria:
      document.getElementById("categoria").value,

    descricao:
      document.getElementById("descricao").value,

    status: "novo",

    videosGerados: 0,

    createdAt: new Date()

  };

  try{

    await db.collection("produtos")
      .add(produto);

    status.innerHTML =
      "✅ Produto salvo!";

    limparCampos();

    carregarProdutos();

  }catch(error){

    console.error(error);

    status.innerHTML =
      "❌ Erro ao salvar";

  }

}

// =====================================
// IMPORTAR CSV
// =====================================

async function importarCSV(){

  const file =
    document.getElementById("csvFile")
    .files[0];

  if(!file){

    alert("Selecione um CSV");

    return;

  }

  const texto = await file.text();

  const linhas = texto.split("\n");

  linhas.shift();

  let total = 0;

  for(const linha of linhas){

    if(!linha.trim()) continue;

    const dados = linha.split(",");

    const produto = {

      titulo: dados[0]?.trim() || "",

      preco: dados[1]?.trim() || "",

      imagem: dados[2]?.trim() || "",

      link: dados[3]?.trim() || "",

      categoria: dados[4]?.trim() || "",

      descricao: "",

      status: "novo",

      videosGerados: 0,

      createdAt: new Date()

    };

    try{

      await db.collection("produtos")
        .add(produto);

      total++;

    }catch(error){

      console.error(error);

    }

  }

  alert(
    total + " produtos importados!"
  );

  carregarProdutos();

}

// =====================================
// LISTAR PRODUTOS
// =====================================

async function carregarProdutos(){

  const lista =
    document.getElementById("listaProdutos");

  lista.innerHTML = "";

  const snapshot =
    await db.collection("produtos")
    .orderBy("createdAt", "desc")
    .get();

  snapshot.forEach(doc => {

    const p = doc.data();

    lista.innerHTML += `

      <div class="produto">

        <h2>${p.titulo}</h2>

        <p><strong>Preço:</strong> R$ ${p.preco}</p>

        <p><strong>Categoria:</strong> ${p.categoria}</p>

        <p><strong>Status:</strong> ${p.status || "novo"}</p>

        <p><strong>Vídeos:</strong> ${p.videosGerados || 0}</p>

        <img src="${p.imagem}">

        <div class="acoes">

          <button
            class="btnExcluir"
            onclick="excluirProduto('${doc.id}')"
          >
            Excluir
          </button>

        </div>

      </div>

    `;

  });

}

// =====================================
// EXCLUIR
// =====================================

async function excluirProduto(id){

  const confirmar =
    confirm("Deseja excluir?");

  if(!confirmar) return;

  await db.collection("produtos")
    .doc(id)
    .delete();

  carregarProdutos();

}

// =====================================
// LIMPAR
// =====================================

function limparCampos(){

  document.getElementById("titulo").value = "";

  document.getElementById("preco").value = "";

  document.getElementById("imagem").value = "";

  document.getElementById("link").value = "";

  document.getElementById("categoria").value = "";

  document.getElementById("descricao").value = "";

}

</script>

</body>
</html>
