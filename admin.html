<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>

body{
  background:#111;
  color:white;
  font-family:Arial;
  padding:20px;
}

.container{
  max-width:700px;
  margin:auto;
  background:#1e1e1e;
  padding:25px;
  border-radius:12px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2c2c2c;
  color:white;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
  font-weight:bold;
}

.produto{
  background:#2a2a2a;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

.produto img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

.acoes{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btnExcluir{
  background:#d50000;
}

.btnScore{
  background:#2962ff;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="container" id="loginBox">

<h1>Login Admin</h1>

<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<!-- PAINEL -->

<div class="container" id="painel" style="display:none;">

<h1>Painel Admin</h1>

<input id="titulo" placeholder="Título">
<input id="preco" placeholder="Preço">
<input id="imagem" placeholder="Imagem URL">
<input id="link" placeholder="Link afiliado">
<input id="categoria" placeholder="Categoria">

<textarea id="descricao" placeholder="Descrição"></textarea>

<button onclick="salvarProduto()">Salvar Produto</button>
<button onclick="logout()">Sair</button>

<div id="status"></div>

<hr>

<!-- 🔥 CSV IMPORT -->

<h2>📥 Importar CSV</h2>

<input type="file" id="csvFile" accept=".csv">

<button onclick="importarCSV()">
Importar Produtos
</button>

<hr>

<h2>📊 Produtos (Ranking)</h2>

<div id="listaProdutos"></div>

</div>

<script>

// =====================================
// FIREBASE
// =====================================

const firebaseConfig = {
  apiKey: "AIzaSyBrd48UiFiA5OGN2rhLptXSSg_PX5s4AGA",
  authDomain: "app-afiliados-971c8.firebaseapp.com",
  projectId: "app-afiliados-971c8",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// =====================================
// LOGIN
// =====================================

function login(){

  firebase.auth()
  .signInWithEmailAndPassword(
    email.value,
    senha.value
  )
  .then(()=>{

    loginBox.style.display="none";
    painel.style.display="block";
    carregarProdutos();

  })
  .catch(e=>alert(e.message));

}

// =====================================
// LOGOUT
// =====================================

function logout(){
  firebase.auth().signOut();
  location.reload();
}

// =====================================
// AUTH
// =====================================

firebase.auth().onAuthStateChanged(user=>{
  if(user){
    loginBox.style.display="none";
    painel.style.display="block";
    carregarProdutos();
  }
});

// =====================================
// SALVAR PRODUTO
// =====================================

async function salvarProduto(){

  await db.collection("produtos").add({

    titulo: titulo.value,
    preco: preco.value,
    imagem: imagem.value,
    link: link.value,
    categoria: categoria.value,
    descricao: descricao.value,

    status: "novo",
    videosGerados: 0,
    score: 0,
    createdAt: new Date()

  });

  status.innerHTML = "Produto salvo!";
  carregarProdutos();

}

// =====================================
// IMPORTAR CSV
// =====================================

async function importarCSV(){

  const file = document.getElementById("csvFile").files[0];

  if(!file){
    alert("Selecione um CSV");
    return;
  }

  const texto = await file.text();
  const linhas = texto.split("\n");

  linhas.shift();

  let total = 0;

  for(const linha of linhas){

    if(!linha.trim()) continue;

    const dados = linha.split(",");

    await db.collection("produtos").add({

      titulo: dados[0]?.trim(),
      preco: dados[1]?.trim(),
      imagem: dados[2]?.trim(),
      link: dados[3]?.trim(),
      categoria: dados[4]?.trim() || "produto",

      descricao: "",

      status: "novo",
      videosGerados: 0,
      score: 0,
      createdAt: new Date()

    });

    total++;

  }

  alert(total + " produtos importados!");
  carregarProdutos();

}

// =====================================
// AUMENTAR SCORE
// =====================================

async function aumentarScore(id, atual){

  await db.collection("produtos")
  .doc(id)
  .update({
    score: atual + 1
  });

  carregarProdutos();

}

// =====================================
// LISTAR (RANKING)
// =====================================

async function carregarProdutos(){

  listaProdutos.innerHTML = "";

  const snap = await db.collection("produtos")
  .orderBy("score", "desc")
  .get();

  snap.forEach(doc=>{

    let p = doc.data();

    listaProdutos.innerHTML += `

      <div class="produto"
      style="border-left:5px solid ${
        (p.score||0)>=5 ? '#00e676' : '#444'
      }">

        <h3>${p.titulo}</h3>

        <p>💰 ${p.preco}</p>

        <p>⭐ Score: ${p.score || 0}</p>

        <p>Status: ${p.status}</p>

        <p>Vídeos: ${p.videosGerados || 0}</p>

        <img src="${p.imagem}">

        <div class="acoes">

          <button class="btnExcluir"
          onclick="excluir('${doc.id}')">
            Excluir
          </button>

          <button class="btnScore"
          onclick="aumentarScore('${doc.id}', ${p.score||0})">
            + Score
          </button>

        </div>

      </div>

    `;

  });

}

// =====================================
// EXCLUIR
// =====================================

async function excluir(id){

  await db.collection("produtos")
  .doc(id)
  .delete();

  carregarProdutos();

}

</script>

</body>
</html>
