<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin IA</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  background:#111;
  color:white;
  font-family:Arial;
  padding:20px;
}

.container{
  max-width:850px;
  margin:auto;
  background:#1e1e1e;
  padding:25px;
  border-radius:12px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2c2c2c;
  color:white;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
  font-weight:bold;
}

.produto{
  background:#2a2a2a;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

.produto img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

.acoes{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btnExcluir{ background:#d50000; }
.btnScore{ background:#2962ff; }

</style>

</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginBox">

<h1>Login Admin IA</h1>

<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<!-- PAINEL -->
<div class="container" id="painel" style="display:none;">

<h1>📊 Painel Inteligente</h1>

<input id="titulo" placeholder="Título">
<input id="preco" placeholder="Preço">
<input id="imagem" placeholder="Imagem URL">
<input id="link" placeholder="Link afiliado">
<input id="categoria" placeholder="Categoria">

<textarea id="descricao" placeholder="Descrição"></textarea>

<button onclick="salvarProduto()">Salvar Produto</button>
<button onclick="logout()">Sair</button>

<hr>

<h2>📥 Importar CSV</h2>
<input type="file" id="csvFile" accept=".csv">
<button onclick="importarCSV()">Importar Produtos</button>

<hr>

<h2>📊 Gráfico de Performance</h2>
<canvas id="grafico"></canvas>

<hr>

<h2>🏆 Vencedores do Dia</h2>
<div id="vencedores"></div>

<hr>

<h2>📦 Produtos</h2>
<div id="listaProdutos"></div>

<hr>

<h2>🧠 IA SUGESTÃO</h2>
<p id="iaSugestao">Carregando...</p>

</div>

<script>

// =====================================
// FIREBASE
// =====================================

const firebaseConfig = {
  apiKey: "AIzaSyBrd48UiFiA5OGN2rhLptXSSg_PX5s4AGA",
  authDomain: "app-afiliados-971c8.firebaseapp.com",
  projectId: "app-afiliados-971c8",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// =====================================
// LOGIN
// =====================================

function login(){

  firebase.auth()
  .signInWithEmailAndPassword(email.value, senha.value)
  .then(()=>{

    loginBox.style.display="none";
    painel.style.display="block";

    carregarTudo();

  })
  .catch(e=>alert(e.message));

}

// =====================================
// LOGOUT
// =====================================

function logout(){
  firebase.auth().signOut();
  location.reload();
}

// =====================================
// AUTH
// =====================================

firebase.auth().onAuthStateChanged(user=>{
  if(user){
    loginBox.style.display="none";
    painel.style.display="block";
    carregarTudo();
  }
});

// =====================================
// SALVAR
// =====================================

async function salvarProduto(){

  await db.collection("produtos").add({

    titulo: titulo.value,
    preco: preco.value,
    imagem: imagem.value,
    link: link.value,
    categoria: categoria.value,

    status: "novo",
    score: 0,
    nivel: "medio",
    videosGerados: 0,
    createdAt: new Date()

  });

  carregarTudo();

}

// =====================================
// CSV
// =====================================

async function importarCSV(){

  const file = csvFile.files[0];
  if(!file){ alert("Selecione CSV"); return; }

  const text = await file.text();
  const linhas = text.split("\n");

  linhas.shift();

  for(const l of linhas){

    if(!l.trim()) continue;

    const d = l.split(",");

    await db.collection("produtos").add({

      titulo: d[0],
      preco: d[1],
      imagem: d[2],
      link: d[3],
      categoria: d[4] || "produto",

      status: "novo",
      score: 0,
      nivel: "medio",
      videosGerados: 0,
      createdAt: new Date()

    });

  }

  carregarTudo();

}

// =====================================
// SCORE
// =====================================

async function aumentarScore(id, atual){

  await db.collection("produtos")
  .doc(id)
  .update({ score: atual + 1 });

  carregarTudo();

}

// =====================================
// CARREGAR TUDO
// =====================================

async function carregarTudo(){

  carregarProdutos();
  carregarVencedores();
  carregarGrafico();
  carregarIA();

}

// =====================================
// PRODUTOS
// =====================================

async function carregarProdutos(){

  listaProdutos.innerHTML = "";

  const snap = await db.collection("produtos")
  .orderBy("score","desc")
  .get();

  snap.forEach(doc=>{

    let p = doc.data();

    listaProdutos.innerHTML += `
      <div class="produto">

        <h3>${p.titulo}</h3>
        <p>💰 ${p.preco}</p>
        <p>⭐ Score: ${p.score||0}</p>
        <p>🏆 ${p.nivel||"medio"}</p>

        <img src="${p.imagem}">

        <div class="acoes">

          <button class="btnExcluir"
          onclick="excluir('${doc.id}')">
            Excluir
          </button>

          <button class="btnScore"
          onclick="aumentarScore('${doc.id}',${p.score||0})">
            + Score
          </button>

        </div>

      </div>
    `;

  });

}

// =====================================
// VENCEDORES
// =====================================

async function carregarVencedores(){

  vencedores.innerHTML = "";

  const snap = await db.collection("produtos")
  .where("nivel","==","vencedor")
  .orderBy("score","desc")
  .limit(10)
  .get();

  snap.forEach(doc=>{

    let p = doc.data();

    vencedores.innerHTML += `
      <div class="produto">

        <h3>🔥 ${p.titulo}</h3>
        <p>💰 ${p.preco}</p>
        <p>⭐ ${p.score}</p>

      </div>
    `;

  });

}

// =====================================
// GRÁFICO
// =====================================

async function carregarGrafico(){

  const snap = await db.collection("produtos").get();

  let labels = [];
  let data = [];

  snap.forEach(doc=>{

    let p = doc.data();

    labels.push(p.titulo);
    data.push(p.score || 0);

  });

  new Chart(document.getElementById("grafico"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Score",
        data: data
      }]
    }
  });

}

// =====================================
// IA SIMPLES
// =====================================

async function carregarIA(){

  const snap = await db.collection("produtos")
  .orderBy("score","desc")
  .limit(1)
  .get();

  snap.forEach(doc=>{

    let p = doc.data();

    if(p.score >= 5){
      iaSugestao.innerHTML = "🚀 ESCALAR ESTE PRODUTO AGORA";
    } else if(p.score >= 3){
      iaSugestao.innerHTML = "⚠️ TESTAR MAIS ESTE PRODUTO";
    } else {
      iaSugestao.innerHTML = "❌ IGNORAR ESTE PRODUTO";
    }

  });

}

// =====================================
// EXCLUIR
// =====================================

async function excluir(id){

  await db.collection("produtos")
  .doc(id)
  .delete();

  carregarTudo();

}

</script>

</body>
</html>
